<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MacroPad Configurator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script>
    // Initialize bridge before React mounts. If qwebchannel is unavailable
    // (running in plain browser), MP_BRIDGE stays null and the UI falls back
    // to demo behaviour.
    window.MP_BRIDGE_READY = new Promise((resolve) => {
      if (typeof QWebChannel === 'undefined' || typeof qt === 'undefined') {
        window.MP_BRIDGE = null;
        resolve(null);
        return;
      }
      new QWebChannel(qt.webChannelTransport, (channel) => {
        window.MP_BRIDGE = channel.objects.bridge || null;
        resolve(window.MP_BRIDGE);
      });
    });
  </script>

  <script type="text/babel" src="store.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    window.MP_BRIDGE_READY.then(() => {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(
        <window.MP.StoreProvider>
          <window.MPApp />
        </window.MP.StoreProvider>
      );
    });
  </script>
</body>
</html>
